default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "gatylnia_bot_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "gatylnia_bot_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
